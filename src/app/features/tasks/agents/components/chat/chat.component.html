<section class="codex-gui-chat">
    <div class="chat-layout">
        <app-usage-window-rail
            [taskId]="taskId"
            [fetchUsage]="fetchUsageForRail"
            [windowHours]="7 * 24"
        ></app-usage-window-rail>

        <div class="chat-content">
            <section class="plan-panel" *ngIf="plan as currentPlan">
                <p class="plan-explanation" *ngIf="currentPlan.explanation">
                    {{ currentPlan.explanation }}
                </p>
                <ol class="plan-steps">
                    <li
                        class="plan-step"
                        *ngFor="let step of currentPlan.steps; trackBy: trackPlanStep"
                        [attr.data-status]="step.status"
                    >
                        <span class="plan-step-status">{{ step.status }}</span>
                        <span class="plan-step-text">{{ step.step }}</span>
                    </li>
                </ol>
            </section>

            <app-codex-gui-message-list
                [messages]="messages"
                [showInitialLoading]="!messagesHydrated"
                [isWorking]="isWorking"
                [activityLabel]="activity?.label ?? ''"
                [activityStartedAt]="activity?.startedAt ?? null"
                [stripPathPrefix]="stripPathPrefix"
                [isActive]="isActive"
                (diffFileRequested)="onDiffFileRequested($event)"
            ></app-codex-gui-message-list>

            <app-codex-gui-inline-request
                *ngIf="pendingRequest"
                [request]="pendingRequest"
                [requestAnswers]="requestAnswers"
                (decisionSelected)="approve($event)"
                (answerChanged)="setRequestQuestionValue($event.questionId, $event.value)"
                (submitAnswers)="submitUserInput()"
            ></app-codex-gui-inline-request>

            <app-codex-gui-composer
                [prompt]="prompt"
                [sending]="sending"
                [isWorking]="isWorking"
                [limitWindowDurationMins]="limitStatus?.windowDurationMins ?? null"
                [limitUsedPercent]="limitStatus?.usedPercent ?? null"
                [contextWindowUsed]="tokenUsage?.lastTotalTokens ?? null"
                [contextWindowSize]="tokenUsage?.modelContextWindow ?? null"
                [selectedModel]="selectedModel"
                [modelOptions]="modelOptions"
                [selectedEffort]="selectedEffort"
                [effortOptions]="effortOptions"
                (promptChange)="prompt = $event"
                (sendRequested)="send()"
                (stopRequested)="stop()"
                (modelChange)="onModelChange($event)"
                (effortChange)="onEffortChange($event)"
            ></app-codex-gui-composer>
        </div>
    </div>
</section>
