<div class="messages-shell" #scrollHost rxVirtualScrollElement>
    <div class="loading-state" *ngIf="isActive && showInitialLoading">
        <app-loading-spinner></app-loading-spinner>
    </div>

    <div
        class="empty-state"
        *ngIf="
            isActive &&
            !showInitialLoading &&
            historyListItems.length === 0 &&
            tailItems.length === 0
        "
    >
        Ask Codex to inspect the repo, explain diffs, or implement a task.
    </div>

    <rx-virtual-scroll-viewport
        *ngIf="isActive && !showInitialLoading && historyListItems.length > 0"
        class="messages-viewport"
        [dynamic]="estimateHistoryItemSize"
        [initialScrollIndex]="initialScrollIndex"
        [runwayItems]="runwayItems"
        [runwayItemsOpposite]="runwayItemsOpposite"
    >
        <article
            class="message-row"
            *rxVirtualFor="
                let item of historyListItems;
                trackBy: trackByItem;
                templateCacheSize: templateCacheSize;
                renderCallback: historyRenderCallback
            "
            [attr.data-track-key]="item.trackKey"
            [class.user-row]="item.rowRole === 'user'"
            [class.assistant-row]="item.rowRole !== 'user'"
            [class.compact-with-next]="item.compactWithNext"
            [attr.data-role]="item.dataRole"
            [attr.data-status]="item.dataStatus"
            [attr.aria-live]="item.renderKind === 'typing' ? 'polite' : null"
        >
            <div class="msg-body">
                <ng-container
                    [ngTemplateOutlet]="messageRow"
                    [ngTemplateOutletContext]="{ $implicit: item }"
                ></ng-container>
            </div>
        </article>
    </rx-virtual-scroll-viewport>

    <ng-container *ngIf="isActive && !showInitialLoading">
        <article
            *ngFor="let item of tailItems; trackBy: trackByItem"
            class="message-row tail-row"
            [class.user-row]="item.rowRole === 'user'"
            [class.assistant-row]="item.rowRole !== 'user'"
            [class.compact-with-next]="item.compactWithNext"
            [attr.data-role]="item.dataRole"
            [attr.data-status]="item.dataStatus"
            [attr.aria-live]="item.renderKind === 'typing' ? 'polite' : null"
        >
            <div class="msg-body">
                <ng-container
                    [ngTemplateOutlet]="messageRow"
                    [ngTemplateOutletContext]="{ $implicit: item }"
                ></ng-container>
            </div>
        </article>
    </ng-container>
</div>

<ng-template #messageRow let-item>
    <app-codex-gui-user-message
        *ngIf="item.renderKind === 'user'"
        [html]="item.html"
        (contentClick)="onContentClick($event)"
    ></app-codex-gui-user-message>

    <app-codex-gui-tool-message
        *ngIf="item.renderKind === 'tool'"
        [rows]="item.toolRows"
        [isRunning]="item.isToolRunning"
        [statusLabel]="item.toolStatusLabel"
        [stripPathPrefix]="stripPathPrefix"
        (contentClick)="onContentClick($event)"
    ></app-codex-gui-tool-message>

    <app-codex-gui-standard-message
        *ngIf="item.renderKind === 'standard'"
        [role]="item.dataRole === 'system' ? 'system' : 'assistant'"
        [streamingPlain]="item.streamingPlain"
        [plainContent]="item.plainContent"
        [html]="item.html"
        (contentClick)="onContentClick($event)"
    ></app-codex-gui-standard-message>

    <app-codex-gui-reasoning-message
        *ngIf="item.renderKind === 'reasoning'"
        [streamingPlain]="item.streamingPlain"
        [plainContent]="item.plainContent"
        [html]="item.html"
        (contentClick)="onContentClick($event)"
    ></app-codex-gui-reasoning-message>

    <app-codex-gui-typing-indicator
        *ngIf="item.renderKind === 'typing'"
        [label]="item.typingLabel"
        [startedAt]="item.typingStartedAt"
        [showLabel]="item.showTypingLabel"
    ></app-codex-gui-typing-indicator>

    <app-codex-gui-throbber
        *ngIf="item.showStreamingIndicator"
        class="streaming-indicator"
        aria-hidden="true"
    ></app-codex-gui-throbber>
</ng-template>
