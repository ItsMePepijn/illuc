<div
    class="launch-dropdown"
    [class.open]="menuOpen"
    [class.compact]="compact"
    (click)="$event.stopPropagation()"
>
    <app-rail-button
        [buttonClass]="buttonClass"
        [loading]="isBusy"
        [disabled]="isDisabled"
        [ariaLabel]="ariaLabel"
        [ariaExpanded]="menuOpen"
        ariaHaspopup="menu"
        [title]="title"
        [icon]="icon"
        (action)="toggleMenu($event)"
    >
        <ng-template #icon>
            <app-icon-code-brackets
                class="trigger-icon"
                aria-hidden="true"
            ></app-icon-code-brackets>
        </ng-template>

        <span *ngIf="!compact" class="trigger-label">Open</span>
        <span class="caret" aria-hidden="true">▾</span>
    </app-rail-button>

    <div
        class="launch-menu"
        *ngIf="menuOpen"
        role="menu"
        [attr.aria-label]="ariaLabel"
    >
        <button
            type="button"
            class="launch-menu-item"
            role="menuitem"
            *ngFor="let editor of editors"
            [disabled]="isBusy"
            (click)="choose(editor, $event)"
        >
            <app-editor-app-icon
                [icon]="editor.icon"
                [appName]="editor.name"
                [iconDataUrl]="editor.iconDataUrl ?? null"
            ></app-editor-app-icon>
            <span class="editor-name">{{ editor.name }}</span>
        </button>

        <div class="launch-menu-divider" aria-hidden="true"></div>

        <button
            type="button"
            class="launch-menu-item launch-menu-item-special"
            role="menuitem"
            [disabled]="isBusy"
            (click)="openInExplorer($event)"
        >
            <app-icon-folder-open aria-hidden="true"></app-icon-folder-open>
            <span class="editor-name">{{ explorerLabel }}</span>
        </button>
    </div>
</div>
