<div class="start-agent-grid" [class.busy]="loading">
    <button
        type="button"
        class="agent-tile"
        *ngFor="let tile of tiles()"
        [class.unavailable]="!tile.installed"
        [class.loading]="loading"
        [attr.data-brand]="tile.brand"
        [disabled]="disabled || loading || !tile.installed"
        [title]="tile.installed ? tile.label : tile.title"
        (click)="choose(tile.kind)"
    >
        <span class="agent-logo-shell" aria-hidden="true">
            <app-agent-brand-logo class="agent-logo" [brand]="tile.brand"></app-agent-brand-logo>
        </span>
        <span class="agent-copy">
            <span class="agent-name">{{ tile.label }}</span>
            <span class="agent-subtitle">{{ tile.subtitle }}</span>
        </span>
    </button>
</div>
